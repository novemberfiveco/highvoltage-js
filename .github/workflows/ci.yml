name: Release @novemberfiveco/highvoltage-js
concurrency:
  group: publish-${{ github.github.base_ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      type:
        type: choice
        description: "Choose the release type"
        options:
          - patch
          - minor
          - major
        required: true
        default: patch
      dry:
        type: boolean
        description: Dry run release
        default: false

jobs:
  publish:
    if: github.repository == 'novemberfiveco/highvoltage-js' && github.ref == 'refs/heads/master'
    name: "Publish"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: "0"
          token: ${{ secrets.GH_PUSH_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24.11"
          registry-url: https://registry.npmjs.org/
          cache: "npm"

      - name: Git Config
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        run: npm run release -- --ci -V --increment $TYPE_ARG $DRY_ARG
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
          TYPE_ARG: ${{ inputs.type }}
          DRY_ARG: ${{ inputs.dry == true && '--dry-run' || '' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
